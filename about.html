<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
            text-align: center;
        }

        h1 {
            margin-bottom: 24px;
            font-size: 1.5rem;
        }

        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 32px;
            text-align: left;
        }

        .card p {
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .card p:last-child {
            margin-bottom: 0;
        }

        nav {
            margin-top: 24px;
        }

        nav a {
            color: #4a90d9;
            text-decoration: none;
            font-size: 1.1rem;
            margin: 0 12px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px auto;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>About</h1>
        <div class="card">
            <p>このサイトはautomation-testプロジェクトのデモページです。</p>
            <p>Playwrightを使ったE2Eテストの自動化を学ぶために作成されました。</p>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</body>
</html>
