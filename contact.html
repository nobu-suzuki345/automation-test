<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        form {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 1.5rem;
        }
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        button[type="submit"] {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background-color: #4a90d9;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button[type="submit"]:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>お問い合わせ</h1>
        <form action="#" method="post">
            <label for="name">お名前</label>
            <input type="text" id="name" name="name" placeholder="山田 太郎" required>

            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>

            <label for="message">メッセージ</label>
            <textarea id="message" name="message" placeholder="お問い合わせ内容を入力してください" required></textarea>

            <button type="submit">送信</button>
        </form>
    </div>
</body>
</html>
